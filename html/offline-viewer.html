<!DOCTYPE html>
<html>
    <head>
        <title>xrit-rx - 离线卫星产品查看器</title>

        <link href='https://fonts.googleapis.com/css?family=Roboto' rel='stylesheet'>
        <link rel="stylesheet" href="css/dash.css" />

        <style>
            .viewer-grid {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 20px;
            }

            .main-image {
                flex: 1 1 600px;
                min-width: 400px;
                max-width: 800px;
            }

            .main-image img {
                max-width: 100%;
                height: auto;
                border-radius: 4px;
                cursor: pointer;
                border: 1px solid #555;
            }

            .main-image img:hover {
                border-color: #e94560;
            }

            .thumbnails {
                flex: 0 0 280px;
                min-width: 200px;
            }

            .thumbnails .thumb-row {
                display: flex;
                align-items: center;
                margin: 10px 0;
                padding: 8px;
                background: #292929;
                border-radius: 6px;
                border: 1px solid #555;
                cursor: pointer;
                transition: border-color 0.2s;
            }

            .thumbnails .thumb-row:hover {
                border-color: #e94560;
            }

            .thumbnails .thumb-row.active {
                border-color: #f5a623;
                background: #333;
            }

            .thumbnails .thumb-row img {
                width: 50px;
                height: 50px;
                object-fit: cover;
                border-radius: 4px;
                margin-right: 12px;
            }

            .thumbnails .thumb-row .thumb-info {
                flex: 1;
                text-align: left;
            }

            .thumbnails .thumb-row .thumb-info .label {
                font-weight: bold;
                font-size: 16px;
                color: #eee;
            }

            .thumbnails .thumb-row .thumb-info .sub {
                font-size: 13px;
                color: #999;
                margin-top: 2px;
            }

            .no-thumb {
                width: 50px;
                height: 50px;
                margin-right: 12px;
                background: #333;
                border-radius: 4px;
                display: flex;
                align-items: center;
                justify-content: center;
                color: #666;
                font-size: 20px;
            }

            .date-nav {
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 15px 0 5px 0;
                gap: 20px;
            }

            .date-nav .nav-btn {
                background: #e94560;
                color: #0f3460;
                border: none;
                padding: 8px 20px;
                border-radius: 6px;
                font-size: 18px;
                font-weight: bold;
                cursor: pointer;
                transition: background 0.2s;
            }

            .date-nav .nav-btn:hover {
                background: #ff6b7f;
            }

            .date-nav .nav-btn:disabled {
                background: #555;
                color: #888;
                cursor: default;
            }

            .date-nav .date-label {
                font-size: 24px;
                font-weight: bold;
                color: #f5a623;
                min-width: 140px;
                text-align: center;
            }

            .image-info {
                margin-top: 15px;
                padding: 12px;
                background: #292929;
                border-radius: 6px;
                border: 1px solid #555;
                text-align: left;
            }

            .image-info .info-row {
                display: flex;
                margin: 4px 0;
                font-size: 14px;
            }

            .image-info .info-label {
                color: #999;
                min-width: 80px;
            }

            .image-info .info-value {
                color: #eee;
                word-break: break-all;
            }

            .image-info .info-value a {
                color: #e94560;
                text-decoration: none;
            }

            .image-info .info-value a:hover {
                text-decoration: underline;
            }

            #block-images {
                width: 100%;
                max-width: 1200px;
                height: auto;
                min-height: 500px;
            }

            #block-images .block-body {
                text-align: left;
            }

            .block.status-ok {
                background: #1C1C1C;
                border-color: #2ecc71;
            }

            .block.status-empty {
                background: #1C1C1C;
                border-color: #f5a623;
            }

            .empty-msg {
                color: #999;
                font-size: 18px;
                text-align: center;
                padding: 60px 20px;
            }

            .empty-msg .big-icon {
                font-size: 64px;
                margin-bottom: 20px;
            }

            .image-counter {
                font-size: 13px;
                color: #666;
                margin-top: 8px;
                text-align: center;
            }

            #latest-fd-path { display: none; }
        </style>
    </head>

    <body onload="init()">
        <h2 id="dash-heading">&nbsp;</h2>

        <div id="container">
            <div class="block" id="block-time" style="width: 390px; height: 180px;">
                <div class="block-heading"></div>
                <div class="block-body">
                    <div class="time" style="float: left;"></div>
                    <div class="time" style="float: right;"></div>
                </div>
            </div>

            <div class="block" id="block-images" style="background: black;">
                <div class="block-heading"></div>
                <div class="block-body" id="viewer-body">
                    <div class="empty-msg">
                        <div class="big-icon">📡</div>
                        <p>正在加载产品数据...</p>
                    </div>
                </div>
            </div>

            <div class="block" id="block-schedule" style="width: 510px; height: 590px;">
                <div class="block-heading"></div>
                <div class="block-body" style="overflow-y: hidden; overflow-x: hidden;">
                    <p>获取计划表...</p>
                </div>
            </div>
        </div>

        <!-- JavaScript -->
        <script type="text/javascript" src="js/tools.js"></script>
        <script type="text/javascript" src="js/offline-viewer.js"></script>
    </body>
</html>
