<!DOCTYPE html>
<html>
    <head>
        <title>xrit-rx - 离线卫星产品查看器</title>

        <link href='https://fonts.googleapis.com/css?family=Roboto' rel='stylesheet'>
        <link rel="stylesheet" href="css/dash.css" />

        <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>

        <style>
            .date-nav {
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0 0 15px 0;
                gap: 20px;
            }

            .date-nav .nav-btn {
                background: #e94560;
                color: #0f3460;
                border: none;
                padding: 6px 18px;
                border-radius: 6px;
                font-size: 16px;
                font-weight: bold;
                cursor: pointer;
                transition: background 0.2s;
            }

            .date-nav .nav-btn:hover { background: #ff6b7f; }
            .date-nav .nav-btn:disabled { background: #555; color: #888; cursor: default; }

            .date-nav .date-label {
                font-size: 22px;
                font-weight: bold;
                color: #f5a623;
                min-width: 140px;
                text-align: center;
            }

            .viewer-split {
                display: flex;
                gap: 16px;
                min-height: 480px;
            }

            /* ---- Product list sidebar ---- */
            .product-list {
                flex: 0 0 200px;
                max-height: 580px;
                overflow-y: auto;
                background: #1a1a1a;
                border: 1px solid #444;
                border-radius: 6px;
                padding: 6px;
                text-align: left;
            }

            .product-list::-webkit-scrollbar { width: 6px; }
            .product-list::-webkit-scrollbar-track { background: #111; }
            .product-list::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }

            .product-group {
                margin-bottom: 6px;
            }

            .product-group .group-header {
                font-size: 12px;
                font-weight: bold;
                color: #f5a623;
                padding: 4px 8px;
                border-bottom: 1px solid #333;
                margin-bottom: 2px;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            .product-item {
                padding: 5px 8px;
                font-size: 13px;
                color: #bbb;
                cursor: pointer;
                border-radius: 4px;
                margin: 1px 0;
                transition: background 0.15s, color 0.15s;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .product-item:hover { background: #333; color: #fff; }
            .product-item.active { background: #e94560; color: #fff; font-weight: bold; }
            .product-item .item-num { color: #888; margin-right: 4px; }

            /* ---- Main image area ---- */
            .main-area {
                flex: 1;
                min-width: 0;
                display: flex;
                flex-direction: column;
            }

            .main-image-wrap {
                flex: 1;
                background: #000;
                border-radius: 6px;
                border: 1px solid #444;
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
                min-height: 350px;
                position: relative;
            }

            .main-image-wrap img {
                max-width: 100%;
                max-height: 100%;
                display: block;
            }

            .main-image-wrap .img-error {
                display: none;
                padding: 40px;
                text-align: center;
                color: #999;
            }

            .image-info {
                margin-top: 8px;
                padding: 8px 12px;
                background: #292929;
                border-radius: 6px;
                border: 1px solid #555;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 13px;
                flex-wrap: wrap;
                gap: 4px;
            }

            .image-info .info-type {
                font-weight: bold;
                color: #f5a623;
            }

            .image-info .info-file {
                color: #bbb;
                word-break: break-all;
            }

            .image-info .info-date {
                color: #888;
            }

            .image-info a {
                color: #e94560;
                text-decoration: none;
            }
            .image-info a:hover { text-decoration: underline; }

            /* ---- Type selector ---- */
            .type-selector {
                display: flex;
                gap: 6px;
                margin-bottom: 8px;
                flex-wrap: wrap;
            }

            .type-btn {
                padding: 5px 14px;
                border-radius: 4px;
                font-size: 13px;
                border: 1px solid #555;
                background: #2a2a2a;
                color: #999;
                cursor: pointer;
                transition: all 0.15s;
            }

            .type-btn:hover { border-color: #f5a623; color: #fff; }
            .type-btn.active { background: #e94560; border-color: #e94560; color: #fff; font-weight: bold; }
            .type-btn.disabled { opacity: 0.3; cursor: default; }

            .empty-msg {
                color: #999;
                font-size: 18px;
                text-align: center;
                padding: 60px 20px;
            }
            .empty-msg .big-icon { font-size: 64px; margin-bottom: 20px; }

            #block-images {
                width: 100%;
                max-width: 1100px;
                height: auto;
                min-height: 500px;
            }

            #block-images .block-body {
                padding: 15px;
            }
        </style>
    </head>

    <body onload="init()">
        <h2 id="dash-heading">&nbsp;</h2>

        <div id="container">
            <div class="block" id="block-time" style="width: 390px; height: 120px;">
                <div class="block-heading"></div>
                <div class="block-body">
                    <div class="time" style="float: left;"></div>
                    <div class="time" style="float: right;"></div>
                </div>
            </div>

            <div class="block" id="block-images" style="background: black;">
                <div class="block-heading"></div>
                <div class="block-body" id="viewer-body">
                    <div class="empty-msg">
                        <div class="big-icon">📡</div>
                        <p>正在加载产品数据...</p>
                    </div>
                </div>
            </div>

            <div class="block" id="block-schedule" style="width: 510px; height: 590px;">
                <div class="block-heading"></div>
                <div class="block-body" style="overflow-y: hidden; overflow-x: hidden;">
                    <p>获取计划表...</p>
                </div>
            </div>
        </div>

        <script type="text/javascript" src="js/tools.js"></script>
        <script type="text/javascript" src="js/offline-viewer.js"></script>
    </body>
</html>
